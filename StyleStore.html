<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleStore</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 15px 8%;
            background: #111;
            color: #fff;
        }

        nav a {
            margin-left: 20px;
            color: #fff;
            text-decoration: none;
        }

        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            color: #fff;
            text-align: center;
        }

        .btn {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background: #fff;
            color: #333;
            cursor: pointer;
            border-radius: 50px;
        }

        .section {
            padding: 60px 8%;
            display: none;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .show {
            display: block
        }
    </style>
</head>

<body>

    <header>
        <h2>StyleStore</h2>
        <nav>
            <a href="#" onclick="showHome()">Home</a>
            <a href="#" onclick="showProducts()">Shop</a>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero" id="home">
        <h1>Shop Fashion & Makeup</h1>
        <p>Trendy styles just for you</p>
        <button border-radius="5px" class="btn" onclick="showProducts()">Shop Now</button>
    </section>

    <!-- PRODUCTS -->
    <section class="section" id="products">
        <h2>Products</h2>
        <br>
        <div class="products">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
                <h3>Leather Jacket</h3>
                <p>₹999</p>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
                <h3>Top Wear</h3>
                <p>₹799</p>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
                <h3>Makeup Kit</h3>
                <p>₹699</p>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad">
                <h3>Fragrance</h3>
                <p>₹299</p>
            </div>

        </div>
    </section>

    <script>
        function showProducts() {
            document.getElementById('home').style.display = 'none';
            document.getElementById('products').classList.add('show');
        }

        function showHome() {
            document.getElementById('home').style.display = 'flex';
            document.getElementById('products').classList.remove('show');
        }
    </script>

</body>

</html>
